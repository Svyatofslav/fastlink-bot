# docker-compose.local.example.yml
# Шаблон для локальной разработки.
#
# Использование:
#   cp docker-compose.local.example.yml docker-compose.local.yml
#   cp .env.example .env.local   # заполни BOT_TOKEN и OWNER_TELEGRAM_ID
#   docker compose -f docker-compose.local.yml up --build
#
# docker-compose.local.yml добавлен в .gitignore — личные правки не попадут в репо.

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastlink-bot-local
    command: ["python", "bot.py"]
    restart: unless-stopped
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bot-net-local
    volumes:
      - .:/app
      - ./logs:/app/logs

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastlink-worker-local
    command: ["python", "worker.py"]
    restart: unless-stopped
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bot-net-local
    volumes:
      - .:/app
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: fastlink-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastlink_local
      POSTGRES_USER: fastlink_local
      POSTGRES_PASSWORD: your_local_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastlink_local -d fastlink_local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-net-local
    ports:
      - "5432:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
      - ./database/views.sql:/docker-entrypoint-initdb.d/01-views.sql:ro
      - ./database/functions.sql:/docker-entrypoint-initdb.d/02-functions.sql:ro
      - ./database/triggers.sql:/docker-entrypoint-initdb.d/03-triggers.sql:ro
      - ./database/indexes.sql:/docker-entrypoint-initdb.d/04-indexes.sql:ro

  redis:
    image: redis:7-alpine
    container_name: fastlink-redis-local
    restart: unless-stopped
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    environment:
      REDIS_PASSWORD: your_local_redis_password
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-net-local
    ports:
      - "6379:6379"

volumes:
  postgres-local-data:

networks:
  bot-net-local:
    driver: bridge
